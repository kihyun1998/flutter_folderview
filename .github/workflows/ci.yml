name: CI

# Runs the package's static analysis and test suite on every push to main and
# on every PR targeting main. Integration tests under example/integration_test
# are intentionally NOT run here: they build and launch a real desktop app,
# which is slow and flaky on headless CI runners. Run those locally per the
# command in their commit messages (flutter test integration_test/... -d windows).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & test (package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      # After pub get: `dart format` reads the package's language version from
      # the resolved package_config, so it uses the same style as local runs.
      # (Without it, dart format defaults to the latest language version and
      # would flag files formatted for the package's lower SDK bound.)
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test benchmark
      - name: Analyze
        run: flutter analyze
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn
      # The repo is public, so Codecov works tokenless. To publish coverage,
      # uncomment this step (and add a badge to the README):
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: coverage/lcov.info

  example:
    name: Analyze (example app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      # example depends on the package via a path dependency (../). It has no
      # code generation: its state is a plain ChangeNotifier, so there is
      # nothing for build_runner to produce.
      - name: Install dependencies
        run: flutter pub get
        working-directory: example
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: example
      - name: Analyze
        run: flutter analyze
        working-directory: example
      # Runs example/test only. integration_test/ is excluded here (see the
      # note at the top of this file): it builds and launches a real desktop
      # app. Without this step the example's widget test can fail unnoticed --
      # its `flutter create` counter smoke test was red from the day the
      # example landed.
      - name: Test
        run: flutter test
        working-directory: example
